          <div class="contactWrapperContent">
            <div class="contact-info">
              <h3 class="contactSubHeading">Skontaktuj się</h3>

                <div class="input-group">

                    class="contact-input"
                    placeholder="Enter Your Name"
                  />
                </div>
                <div class="input-groups">
                  <div class="input-group ">
                    <label>Email *</label>
                    <input
                      type="email"
                      class="contact-input offsetForEmail"
                      placeholder="Enter Your Email"
                    />
                  </div>
                  <div class="input-group">
                    <label>Phone</label>
                    <input
                      type="text"
                      class="contact-input offsetForPhone"
                      placeholder="Enter Phone Number"
                    />
                  </div>
                </div>
                <div class="input-group">
                  <label>Message</label>
                  <textarea
                    class="form-textarea"
                    placeholder="Your Message Here..."
                  ></textarea>
                </div>
                <input type="submit" value="Submit" class="form-btn" />
              </form>
            </div>
